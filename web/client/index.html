<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Privacy-Preserving Whistleblower System — Prove document authenticity using Zero-Knowledge Proofs without revealing the file contents or your identity." />
    <title>Whistleblower-ZK | Anonymous Document Authenticator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Buffer polyfill — circomlibjs and snarkjs require Buffer in browser
      if (typeof globalThis.Buffer === 'undefined') {
        globalThis.Buffer = {
          isBuffer: () => false,
          from: (data, encoding) => {
            if (typeof data === 'string') {
              return new TextEncoder().encode(data);
            }
            return new Uint8Array(data);
          },
          alloc: (size) => new Uint8Array(size),
        };
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
